<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signal SF Production</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Production build</p>
          <h1>Signal SF</h1>
        </div>
        <div id="authActions" class="topbar-actions"></div>
      </header>

      <section id="authView" class="auth-grid"></section>

      <section id="appView" class="hidden">
        <div class="hero">
          <div class="hero-copy">
            <p class="eyebrow">Personalized local discovery</p>
            <h2 id="heroTitle">Welcome back</h2>
            <p id="heroText" class="body-copy"></p>
            <div class="hero-actions">
              <button id="refreshButton" class="primary-button">Refresh</button>
              <button id="newPlanButton" class="secondary-button">Create plan</button>
            </div>
          </div>
          <aside class="hero-panel">
            <div id="profileSummary" class="summary-card"></div>
            <h3>Taste profile</h3>
            <form id="preferencesForm" class="form-stack"></form>
          </aside>
        </div>

        <section id="onboardingPanel" class="panel wide hidden"></section>

        <div class="grid">
          <section class="panel wide">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Recommendations</p>
                <h3>Best bets in San Francisco</h3>
              </div>
              <form id="filtersForm" class="filters-row"></form>
            </div>
            <div id="recommendations" class="card-grid"></div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Saved</p>
                <h3>Shortlist</h3>
              </div>
            </div>
            <div id="savedEvents" class="stack"></div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Planner</p>
                <h3>Day plans</h3>
              </div>
              <select id="planSelect" class="field"></select>
            </div>
            <div id="plannerSummary" class="body-copy"></div>
            <div id="plannerWarnings" class="stack"></div>
            <div id="plannerItems" class="stack"></div>
          </section>

          <section class="panel wide">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Explore</p>
                <h3>All events</h3>
              </div>
            </div>
            <div id="explore" class="card-grid compact"></div>
          </section>

          <section class="panel wide">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Details</p>
                <h3 id="detailHeading">Select an event</h3>
              </div>
            </div>
            <div id="detailPanel" class="detail empty">Click any event to inspect recommendation reasons and planner fit.</div>
          </section>
        </div>
      </section>
    </div>

    <template id="eventCardTemplate">
      <article class="card">
        <div class="card-head">
          <p class="eyebrow event-eyebrow"></p>
          <button type="button" class="chip-button save-toggle"></button>
        </div>
        <h4 class="card-title"></h4>
        <p class="body-copy card-copy"></p>
        <div class="chip-row meta-row"></div>
        <div class="chip-row reason-row"></div>
        <div class="button-row">
          <button type="button" class="secondary-button small detail-button">Details</button>
          <button type="button" class="primary-button small plan-button">Add to plan</button>
        </div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
